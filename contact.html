<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Pro - Eebii Invoice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #f8fafc;
            --bg-grad-2: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
            overflow-x: hidden;
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: #475569;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #0f172a;
        }

        .hero-container {
            width: 100%;
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .promo-content h1 {
            font-size: 3rem;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #0f172a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .promo-content p {
            font-size: 1.125rem;
            line-height: 1.7;
            color: #475569;
            margin-bottom: 2rem;
        }

        .feature-list {
            list-style: none;
            padding: 0;
            margin: 0 0 2rem 0;
        }

        .feature-list li {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
            color: #334155;
        }

        .feature-list li svg {
            width: 20px;
            height: 20px;
            color: #10b981;
        }

        .glass-form {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--glass-shadow);
        }

        .glass-form h2 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #475569;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 0.875rem 1rem;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            color: #1e293b;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: #0f172a;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .hero-container {
                grid-template-columns: 1fr;
                padding: 1rem;
                margin-top: 4rem;
            }

            .promo-content {
                text-align: center;
            }

            .promo-content h1 {
                font-size: 2.5rem;
            }

            .feature-list li {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-btn">
        <svg xmlns="http://www.w3.org/.svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to App
    </a>

    <div class="hero-container">
        <div class="promo-content">
            <h1>Upgrade to Pro</h1>
            <p>Take your billing to the next level. Custom branding, automated follow-ups, API access, and cloud sync
                for unlimited invoices.</p>

            <ul class="feature-list">
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Custom Branded PDFs
                </li>
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Cloud Sync & Backup
                </li>
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    E-Invoicing API Access
                </li>
            </ul>
        </div>

        <div class="glass-form">
            <h2>Contact Sales</h2>
            <form onsubmit="alert('Thank you for your interest! Our team will contact you shortly.'); return false;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Work Email</label>
                    <input type="email" placeholder="john@company.com" required>
                </div>
                <div class="form-group">
                    <label>Message / Requirements (Optional)</label>
                    <textarea rows="3" placeholder="Tell us about your volume..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Request Early Access</button>
            </form>
        </div>
    </div>

</body>

</html>
